name: llm

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /root/antoniogarciatrevijano.info/infra/llm/models:/models
    command: >
      --model /models/Qwen3.5-27B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 8192
      --threads 6
      --no-mmap
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
