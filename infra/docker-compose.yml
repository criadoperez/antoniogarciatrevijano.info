name: ipfs

services:
  kubo:
    image: ipfs/kubo:latest
    container_name: kubo
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
    volumes:
      - ipfs_data:/data/ipfs
      - /var/www/ipfs/staging:/export
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "0.5"
    networks:
      - ipfs_net
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  ipfs-cluster:
    image: ipfs/ipfs-cluster:latest
    container_name: ipfs-cluster
    restart: unless-stopped
    depends_on:
      - kubo
    ports:
      - "9096:9096"              # cluster swarm — public (followers connect here)
      - "127.0.0.1:9094:9094"   # REST API — localhost only (scripts use this)
    volumes:
      - ipfs_cluster_data:/data/ipfs-cluster
    networks:
      - ipfs_net
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  ipfs_net:
    external: true
    name: ipfs_net

volumes:
  ipfs_data:
  ipfs_cluster_data:
